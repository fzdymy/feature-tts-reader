name: Convert DistilBERT to Core ML

on:
  push:
    branches:
      - main
    paths:
      - Scripts/convert_distilbert.py
  workflow_dispatch:
    inputs:
      model_id:
        description: 'HuggingFace model ID'
        required: false
        default: 'google-bert/bert-base-chinese'
      commit_models:
        description: 'Commit model files to repo'
        type: boolean
        default: true

jobs:
  convert:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: bert-base-chinese-${{ hashFiles('Scripts/convert_distilbert.py') }}

      - name: Install dependencies
        run: |
          pip install torch transformers==4.30.0 coremltools>=8.0 numpy sentence-transformers

      - name: Convert to Core ML
        run: |
          python Scripts/convert_distilbert.py

      - name: Package model
        run: |
          cd Sources/FeatureTTSReaderApp/Models
          echo "=== Files in Models directory ==="
          ls -lhR distilbert_chinese.mlpackage
          echo "=== vocab.txt ==="
          wc -l vocab.txt
          # Create zip for release
          zip -r distilbert_chinese.mlpackage.zip distilbert_chinese.mlpackage vocab.txt
          ls -lh distilbert_chinese.mlpackage.zip

      - name: Upload model as artifact
        uses: actions/upload-artifact@v4
        with:
          name: distilbert-chinese-coreml
          path: Sources/FeatureTTSReaderApp/Models/distilbert_chinese.mlpackage.zip
          if-no-files-found: error
          retention-days: 90

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: coreml-model-${{ github.run_id }}
          name: "DistilBERT Chinese Core ML Model"
          body: |
            Core ML conversion of `distilbert-base-chinese` for on-device speaker detection.

            **Files:**
            - `distilbert_chinese.mlpackage` — Core ML model (embedding output, 128-dim input)
            - `vocab.txt` — BERT vocabulary for Swift tokenizer
          files: |
            Sources/FeatureTTSReaderApp/Models/distilbert_chinese.mlpackage.zip
          draft: false
          prerelease: false

      - name: Commit model to repo
        if: ${{ github.event_name == 'push' || github.event.inputs.commit_models == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f Sources/FeatureTTSReaderApp/Models/distilbert_chinese.mlpackage Sources/FeatureTTSReaderApp/Models/vocab.txt
          git commit -m "chore: update Core ML model"
          git push

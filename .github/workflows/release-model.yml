name: Release CosyVoice Model

on:
  workflow_dispatch:
    inputs:
      variant:
        description: Model variant
        required: true
        default: aufklarer/CosyVoice3-0.5B-MLX-4bit
        type: choice
        options:
          - aufklarer/CosyVoice3-0.5B-MLX-4bit
          - aufklarer/CosyVoice3-0.5B-MLX-8bit
          - aufklarer/CosyVoice3-0.5B-MLX-8bit-full
          - aufklarer/CosyVoice3-0.5B-MLX-bf16

concurrency:
  group: release-model
  cancel-in-progress: true

jobs:
  upload-model:
    runs-on: macos-15
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          python3 -m venv /tmp/hf-venv
          source /tmp/hf-venv/bin/activate
          pip install -q huggingface_hub

      - name: Resolve variant
        id: resolve
        run: |
          MODEL="${{ github.event.inputs.variant }}"
          if [ -z "$MODEL" ]; then
            MODEL="aufklarer/CosyVoice3-0.5B-MLX-4bit"
          fi
          echo "MODEL=$MODEL" >> "$GITHUB_OUTPUT"
          TAG="${MODEL#*/}"
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download model
        env:
          MODEL_ID: ${{ steps.resolve.outputs.MODEL }}
        run: |
          source /tmp/hf-venv/bin/activate
          echo "Downloading $MODEL_ID ..."
          mkdir -p /tmp/cosyvoice-model
          python3 << 'PYEOF'
import os
os.environ['HF_HUB_ENABLE_HF_TRANSFER'] = '1'
from huggingface_hub import snapshot_download
mid = os.environ['MODEL_ID']
snapshot_download(repo_id=mid, local_dir='/tmp/cosyvoice-model',
                  local_dir_use_symlinks=False, resume_download=True)
PYEOF
          cd /tmp
          tar czf "cosyvoice-${TAG}.tar.gz" cosyvoice-model/
          ls -lh "cosyvoice-${TAG}.tar.gz"

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.resolve.outputs.TAG }}"
          MODEL="${{ steps.resolve.outputs.MODEL }}"
          gh release delete "cosyvoice-${TAG}" --yes 2>/dev/null || true
          gh release create "cosyvoice-${TAG}" \
            "/tmp/cosyvoice-${TAG}.tar.gz" \
            --title "CosyVoice Model ${TAG}" \
            --notes "CosyVoice variant: ${MODEL}" \
            --prerelease

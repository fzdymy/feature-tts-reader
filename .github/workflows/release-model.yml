name: Release CosyVoice Model

on:
  workflow_dispatch:
    inputs:
      variant:
        description: Model variant
        required: true
        default: aufklarer/CosyVoice3-0.5B-MLX-4bit
        type: choice
        options:
          - aufklarer/CosyVoice3-0.5B-MLX-4bit
          - aufklarer/CosyVoice3-0.5B-MLX-8bit
          - aufklarer/CosyVoice3-0.5B-MLX-8bit-full
          - aufklarer/CosyVoice3-0.5B-MLX-bf16

concurrency:
  group: release-model
  cancel-in-progress: true

jobs:
  upload-model:
    runs-on: macos-15
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          python3 -m venv /tmp/hf-venv
          /tmp/hf-venv/bin/pip install -q huggingface_hub hf-transfer

      - name: Resolve variant
        id: resolve
        run: |
          MODEL="${{ github.event.inputs.variant }}"
          if [ -z "$MODEL" ]; then
            MODEL="aufklarer/CosyVoice3-0.5B-MLX-4bit"
          fi
          echo "MODEL=$MODEL" >> "$GITHUB_OUTPUT"
          TAG="${MODEL#*/}"
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved model: $MODEL"
          echo "Tag: $TAG"

      - name: Download model
        env:
          MODEL_ID: ${{ steps.resolve.outputs.MODEL }}
          HF_HUB_ENABLE_HF_TRANSFER: 1
        run: |
          echo "Downloading $MODEL_ID ..."
          mkdir -p /tmp/cosyvoice-model
          
          cat > /tmp/download.py << 'EOF'
import os
from huggingface_hub import snapshot_download
mid = os.environ['MODEL_ID']
print(f"Starting download of {mid}...")
snapshot_download(
    repo_id=mid,
    local_dir='/tmp/cosyvoice-model',
    local_dir_use_symlinks=False,
    resume_download=True
)
print("Download completed!")
EOF
          
          /tmp/hf-venv/bin/python3 /tmp/download.py
          
          cd /tmp
          echo "Creating archive..."
          tar czf "cosyvoice-${{ steps.resolve.outputs.TAG }}.tar.gz" cosyvoice-model/
          ls -lh "cosyvoice-${{ steps.resolve.outputs.TAG }}.tar.gz"
          du -sh cosyvoice-model/

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.resolve.outputs.TAG }}"
          MODEL="${{ steps.resolve.outputs.MODEL }}"
          echo "Creating release for tag: $TAG"
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" \
            "/tmp/cosyvoice-$TAG.tar.gz" \
            --title "CosyVoice Model ${TAG}" \
            --notes "CosyVoice variant: ${MODEL}" \
            --prerelease
          echo "✅ Release created successfully!"

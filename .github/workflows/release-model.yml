name: Release CosyVoice Model

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/release-model.yml'
  schedule:
    - cron: '0 6 1 * *'  # 每月1日 06:00 UTC 自动运行
  workflow_dispatch:
    inputs:
      variant:
        description: 'Model variant'
        required: true
        default: 'aufklarer/CosyVoice3-0.5B-MLX-4bit'
        type: choice
        options:
          - aufklarer/CosyVoice3-0.5B-MLX-4bit
          - aufklarer/CosyVoice3-0.5B-MLX-8bit
          - aufklarer/CosyVoice3-0.5B-MLX-8bit-full
          - aufklarer/CosyVoice3-0.5B-MLX-bf16

concurrency:
  group: release-model-${{ github.event.inputs.variant || 'aufklarer/CosyVoice3-0.5B-MLX-4bit' }}
  cancel-in-progress: true

jobs:
  upload-model:
    runs-on: macos-15
    timeout-minutes: 120  # 2h should be enough for 1.2GB download
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure hf CLI (pre-installed on macos-15)
        run: |
          if ! command -v hf &>/dev/null; then
            python3 -m venv /tmp/hf-venv
            source /tmp/hf-venv/bin/activate
            pip install huggingface-hub
            echo "/tmp/hf-venv/bin" >> $GITHUB_PATH
          fi

      - name: Resolve variant
        id: resolve
        run: |
          MODEL="${{ github.event.inputs.variant }}"
          if [ -z "$MODEL" ]; then
            MODEL="aufklarer/CosyVoice3-0.5B-MLX-4bit"
          fi
          echo "MODEL=$MODEL" >> $GITHUB_OUTPUT

          TAG="${MODEL#*/}"
          TAG="${TAG//\//-}"
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Download model from HuggingFace (China mirror)
        env:
          HF_ENDPOINT: https://hf-mirror.com
          HF_TOKEN: ${{ secrets.HF_TOKEN || '' }}
        run: |
          MODEL="${{ steps.resolve.outputs.MODEL }}"
          TAG="${{ steps.resolve.outputs.TAG }}"
          echo "Downloading $MODEL via $HF_ENDPOINT ..."

          mkdir -p /tmp/cosyvoice-model

          # Login if token is available (public repos work without it)
          if [ -n "$HF_TOKEN" ]; then
            if command -v hf &>/dev/null; then
              hf auth login --token "$HF_TOKEN"
            else
              huggingface-cli login --token "$HF_TOKEN"
            fi
          fi

          if command -v hf &>/dev/null; then
            hf download "$MODEL" --local-dir /tmp/cosyvoice-model
          else
            huggingface-cli download "$MODEL" \
              --local-dir /tmp/cosyvoice-model \
              --local-dir-use-symlinks False \
              --resume-download
          fi

          # Create tarball
          cd /tmp
          tar czf "cosyvoice-${TAG}.tar.gz" cosyvoice-model/
          ls -lh "cosyvoice-${TAG}.tar.gz"

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.resolve.outputs.TAG }}"
          MODEL="${{ steps.resolve.outputs.MODEL }}"

          # Delete existing release with same tag if it exists
          gh release delete "cosyvoice-${TAG}" --yes 2>/dev/null || true

          gh release create "cosyvoice-${TAG}" \
            "/tmp/cosyvoice-${TAG}.tar.gz" \
            --title "CosyVoice Model ${TAG}" \
            --notes "CosyVoice model variant: ${MODEL}" \
            --prerelease

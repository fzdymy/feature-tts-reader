name: iOS IPA Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest'

      - name: Install dependencies
        run: swift package resolve

      - name: Download Core ML model (latest release)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          echo "::group::Finding latest Core ML model release"
          # Use GitHub API to find the latest release with the coreml-model tag
          LATEST_TAG=$(gh api repos/${{ github.repository }}/releases \
            --jq 'sort_by(.created_at) | reverse | [.[] | select(.tag_name | startswith("coreml-model"))] | .[0].tag_name // empty')
          if [ -z "$LATEST_TAG" ]; then
            echo "::error::No coreml-model release found. IPA will lack the Core ML model."
            echo "::group::Listing available releases for debugging"
            gh release list --limit 10 || true
            echo "::endgroup::"
            exit 1
          fi
          echo "Latest model release: $LATEST_TAG"
          echo "::endgroup::"

          echo "::group::Downloading $LATEST_TAG"
          DL_URL=$(gh api repos/${{ github.repository }}/releases/tags/$LATEST_TAG \
            --jq '.assets[] | select(.name | endswith(".zip")) | .browser_download_url')
          echo "Download URL: $DL_URL"
          curl -fsSL -o Sources/FeatureTTSReaderApp/Models/distilbert_chinese.mlpackage.zip "$DL_URL"
          echo "::endgroup::"

          echo "::group::Extracting mlpackage"
          cd Sources/FeatureTTSReaderApp/Models
          rm -rf distilbert_chinese.mlpackage/
          unzip -o distilbert_chinese.mlpackage.zip
          rm -f distilbert_chinese.mlpackage.zip
          ls -la distilbert_chinese.mlpackage/ | head -5
          echo "::endgroup::"

      - name: Build unsigned app product
        run: |
          xcodebuild build \
            -scheme FeatureTTSReader \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -clonedSourcePackagesDirPath $PWD/.spm_cache \
            BUILD_DIR=$PWD/build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            SKIP_PLUGIN_VALIDATION=YES \
            -skipPackagePluginValidation

      - name: Package app into IPA
        run: |
          APP_DIR="build/Payload/FeatureTTSReader.app"
          mkdir -p "$APP_DIR"
          
          # 1. Copy executable binary
          cp build_output/Release-iphoneos/FeatureTTSReader "$APP_DIR/"
          
          # 2. Copy resource bundle if it exists (SPM generates one when Resources/ is present)
          if [ -d "build_output/Release-iphoneos/FeatureTTSReader_FeatureTTSReaderApp.bundle" ]; then
            cp -R "build_output/Release-iphoneos/FeatureTTSReader_FeatureTTSReaderApp.bundle" "$APP_DIR/"
          fi
          
          # 3. Create required Info.plist with APPLICATION type (APPL)
          PLIST_PATH="$APP_DIR/Info.plist"
          plutil -create xml1 "$PLIST_PATH"
          plutil -insert CFBundleDevelopmentRegion -string "en" "$PLIST_PATH"
          plutil -insert CFBundleExecutable -string "FeatureTTSReader" "$PLIST_PATH"
          plutil -insert CFBundleIdentifier -string "com.example.FeatureTTSReader" "$PLIST_PATH"
          plutil -insert CFBundleInfoDictionaryVersion -string "6.0" "$PLIST_PATH"
          plutil -insert CFBundleName -string "FeatureTTSReader" "$PLIST_PATH"
          plutil -insert CFBundlePackageType -string "APPL" "$PLIST_PATH"
          plutil -insert CFBundleShortVersionString -string "1.0" "$PLIST_PATH"
          plutil -insert CFBundleVersion -string "1" "$PLIST_PATH"
          plutil -insert LSRequiresIPhoneOS -bool YES "$PLIST_PATH"
          plutil -insert MinimumOSVersion -string "18.0" "$PLIST_PATH"
          plutil -insert UIDeviceFamily -array "$PLIST_PATH"
          plutil -insert UIDeviceFamily.0 -integer 1 "$PLIST_PATH"
          plutil -insert UIDeviceFamily.1 -integer 2 "$PLIST_PATH"
          
          cd build
          zip -r FeatureTTSReader_unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FeatureTTSReader-Unsigned-IPA
          path: build/FeatureTTSReader_unsigned.ipa
          if-no-files-found: error
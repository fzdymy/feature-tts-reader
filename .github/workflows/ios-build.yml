name: iOS IPA Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest'

      - name: Install dependencies
        run: swift package resolve

      # 关键步骤 1：直接通过构建，并强制关闭代码签名要求
      - name: Build unsigned app product
        run: |
          xcodebuild build \
            -scheme FeatureTTSReader \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath $PWD/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      # 关键步骤 2：手动组装 Payload 文件夹并压缩为标准无签名 .ipa
      - name: Package app into IPA
        run: |
          mkdir -p build/Payload
          # 寻找编译出的 .app 文件并复制到 Payload 目录下
          cp -R DerivedData/Build/Products/Release-iphoneos/*.app build/Payload/
          # 进入 build 目录打包，确保 zip 内部根目录为 Payload
          cd build
          zip -r FeatureTTSReader_unsigned.ipa Payload
          
      - name: Upload Unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FeatureTTSReader-SideStore-Ready
          path: build/FeatureTTSReader_unsigned.ipa
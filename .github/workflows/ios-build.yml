name: iOS IPA Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest'

      - name: Install dependencies
        run: swift package resolve

      - name: Build unsigned app product
        run: |
          xcodebuild build \
            -scheme FeatureTTSReader \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -clonedSourcePackagesDirPath $PWD/.spm_cache \
            BUILD_DIR=$PWD/build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package app into IPA
        run: |
          mkdir -p build/Payload/FeatureTTSReader.app
          cp build_output/Release-iphoneos/FeatureTTSReader build/Payload/FeatureTTSReader.app/
          
          # 使用 Base64 解码生成 Info.plist，彻底杜绝 YAML 格式错误
          echo "" | base64 -d > build/Payload/FeatureTTSReader.app/Info.plist
          
          cd build
          zip -r FeatureTTSReader_unsigned.ipa Payload
          
          # 4. 封包为可供 SideStore 识别的 .ipa 文件
          cd build
          zip -r FeatureTTSReader_unsigned.ipa Payload
name: iOS IPA Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest'

      - name: Install dependencies
        run: swift package resolve

      - name: Build unsigned app product
        run: |
          xcodebuild build \
            -scheme FeatureTTSReader \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath $PWD/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package app into IPA
        run: |
          mkdir -p build/Payload

          APP_PATH=$(find DerivedData -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "错误: 未找到编译出的 .app 文件！"
            exit 1
          fi
          
          echo "寻找到的 App 路径: $APP_PATH"
          cp -R "$APP_PATH" build/Payload/
          
          # 封包为 .ipa 文件
          cd build
          zip -r FeatureTTSReader.ipa Payload
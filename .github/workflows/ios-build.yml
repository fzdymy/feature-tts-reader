name: iOS IPA Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3.0'

      - name: Install dependencies
        run: swift package resolve

      - name: Build app
        run: |
          xcodebuild -scheme FeatureTTSReader \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath $PWD/build/FeatureTTSReader.xcarchive \
            archive

      - name: Create export options plist
        run: |
          mkdir -p build
          cat > build/exportOptions.plist << 'PLIST_EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>method</key>
  <string>development</string>
  <key>signingStyle</key>
  <string>automatic</string>
  <key>compileBitcode</key>
  <false/>
  <key>stripSwiftSymbols</key>
  <true/>
</dict>
</plist>
PLIST_EOF

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $PWD/build/FeatureTTSReader.xcarchive \
            -exportPath $PWD/build/FeatureTTSReader \
            -exportOptionsPlist $PWD/build/exportOptions.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FeatureTTSReader.ipa
          path: build/FeatureTTSReader/FeatureTTSReader.ipa

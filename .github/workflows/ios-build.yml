name: iOS IPA Build

on:
  push:
    branches:
      - main
      - refactor/**
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - name: Set up job
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.1"

      - name: Install dependencies
        run: swift package resolve

      - name: Build unsigned app product
        run: |
          set -o pipefail
          xcodebuild \
            -workspace feature-tts-reader.xcworkspace \
            -scheme FeatureTTSReader \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build_output \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Package app into IPA
        run: |
          APP_PATH=$(find build_output -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app not found"
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r FeatureTTSReader.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FeatureTTSReader-IPA
          path: FeatureTTSReader.ipa
          retention-days: 7
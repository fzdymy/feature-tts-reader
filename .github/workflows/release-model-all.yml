name: Release All CosyVoice Models

on:
  workflow_dispatch:  # 手动触发即可，无需选择

concurrency:
  group: release-all-cosyvoice-models
  cancel-in-progress: true

jobs:
  upload-models:
    runs-on: macos-15
    timeout-minutes: 300   # 时间加长，因为要下载4个模型
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          python3 -m venv /tmp/hf-venv
          /tmp/hf-venv/bin/pip install -q huggingface_hub hf-transfer

      - name: Download and Release All Models
        env:
          HF_HUB_ENABLE_HF_TRANSFER: 1
        run: |
          MODELS=(
            "aufklarer/CosyVoice3-0.5B-MLX-4bit"
            "aufklarer/CosyVoice3-0.5B-MLX-8bit"
            "aufklarer/CosyVoice3-0.5B-MLX-8bit-full"
            "aufklarer/CosyVoice3-0.5B-MLX-bf16"
          )

          for MODEL in "${MODELS[@]}"; do
            echo "========================================="
            echo "Downloading: $MODEL"
            echo "========================================="
            
            TAG="${MODEL#*/}"
            DOWNLOAD_DIR="/tmp/cosyvoice-${TAG}"
            
            mkdir -p "$DOWNLOAD_DIR"
            
            /tmp/hf-venv/bin/python3 -c "
            import os
            from huggingface_hub import snapshot_download
            mid = '$MODEL'
            print(f'Starting download of {mid}...')
            snapshot_download(
              repo_id=mid,
              local_dir='$DOWNLOAD_DIR',
              local_dir_use_symlinks=False,
              resume_download=True
            )
            print('Download completed!')
            "
            
            cd /tmp
            echo "Creating archive for $TAG..."
            tar czf "cosyvoice-${TAG}.tar.gz" "cosyvoice-${TAG}/"
            ls -lh "cosyvoice-${TAG}.tar.gz"
            
            echo "Creating GitHub Release for $TAG..."
            gh release delete "$TAG" --yes 2>/dev/null || true
            
            gh release create "$TAG" \
              "cosyvoice-${TAG}.tar.gz" \
              --title "CosyVoice Model ${TAG}" \
              --notes "CosyVoice variant: ${MODEL}" \
              --prerelease
            
            echo "✅ Released: $TAG"
            echo ""
          done

          echo "All 4 models have been downloaded and released!"

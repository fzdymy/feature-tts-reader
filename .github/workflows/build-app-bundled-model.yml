name: Build IPA with Bundled CosyVoice Model (手动)

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 模型变体
        required: true
        default: aufklarer/CosyVoice3-0.5B-MLX-bf16
        type: choice
        options:
          - aufklarer/CosyVoice3-0.5B-MLX-4bit
          - aufklarer/CosyVoice3-0.5B-MLX-8bit
          - aufklarer/CosyVoice3-0.5B-MLX-8bit-full
          - aufklarer/CosyVoice3-0.5B-MLX-bf16
      release_title:
        description: Release 标题 (留空自动生成)
        required: false
        type: string

concurrency:
  group: build-bundled-${{ inputs.variant }}
  cancel-in-progress: true

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest'

      - name: Compute model tag
        id: model
        run: |
          FULL_ID="${{ inputs.variant }}"
          TAG="${FULL_ID##*/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check if model release exists
        id: check_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.model.outputs.tag }}" --repo "${{ github.repository }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Release ${{ steps.model.outputs.tag }} not found — skipping model download. Build will proceed without bundled model."
          fi

      - name: Download model archive from Release
        if: steps.check_release.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.model.outputs.tag }}"
          echo "Downloading cosyvoice-${TAG}.zip from release $TAG"
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern "cosyvoice-${TAG}.zip" \
            --dir /tmp/model-dl
          ls -lh /tmp/model-dl/

      - name: Extract model
        if: steps.check_release.outputs.exists == 'true'
        run: |
          mkdir -p /tmp/model-extracted
          unzip -o /tmp/model-dl/cosyvoice-*.zip -d /tmp/model-extracted
          echo "Extracted files:"
          ls -la /tmp/model-extracted/

      - name: Install Swift dependencies
        run: swift package resolve

      - name: Download Core ML model (latest release)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          echo "::group::Finding latest Core ML model release"
          LATEST_TAG=$(gh api repos/${{ github.repository }}/releases \
            --jq 'sort_by(.created_at) | reverse | [.[] | select(.tag_name | startswith("coreml-model"))] | .[0].tag_name // empty')
          if [ -z "$LATEST_TAG" ]; then
            echo "::error::No coreml-model release found. IPA will lack the Core ML model."
            gh release list --limit 10 || true
            exit 1
          fi
          echo "Latest model release: $LATEST_TAG"
          echo "::endgroup::"

          echo "::group::Downloading $LATEST_TAG"
          DL_URL=$(gh api repos/${{ github.repository }}/releases/tags/$LATEST_TAG \
            --jq '.assets[] | select(.name | endswith(".zip")) | .browser_download_url')
          curl -fsSL -o Sources/FeatureTTSReaderApp/Models/distilbert_chinese.mlpackage.zip "$DL_URL"
          echo "::endgroup::"

          echo "::group::Extracting mlpackage"
          cd Sources/FeatureTTSReaderApp/Models
          rm -rf distilbert_chinese.mlpackage/
          unzip -o distilbert_chinese.mlpackage.zip
          rm -f distilbert_chinese.mlpackage.zip
          ls -la distilbert_chinese.mlpackage/ | head -5
          echo "::endgroup::"

      - name: Build unsigned app
        run: |
          xcodebuild build \
            -scheme FeatureTTSReader \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -clonedSourcePackagesDirPath $PWD/.spm_cache \
            BUILD_DIR=$PWD/build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            SKIP_PLUGIN_VALIDATION=YES \
            -skipPackagePluginValidation

      - name: Inject model and create IPA
        run: |
          APP_DIR="build/Payload/FeatureTTSReader.app"
          mkdir -p "$APP_DIR"

          # 1. Copy executable binary
          cp build_output/Release-iphoneos/FeatureTTSReader "$APP_DIR/"

          # 2. Copy SPM resource bundle (if generated)
          if [ -d "build_output/Release-iphoneos/FeatureTTSReader_FeatureTTSReaderApp.bundle" ]; then
            cp -R "build_output/Release-iphoneos/FeatureTTSReader_FeatureTTSReaderApp.bundle" "$APP_DIR/"
          fi

          # 3. Inject model files into .app bundle (as raw files; app will set up HF cache)
          if [ -d "/tmp/model-extracted" ] && [ "$(ls -A /tmp/model-extracted/ 2>/dev/null)" ]; then
            MODEL_BUNDLE_DIR="$APP_DIR/cosyvoice-model"
            mkdir -p "$MODEL_BUNDLE_DIR"
            cp -R /tmp/model-extracted/* "$MODEL_BUNDLE_DIR/"
            echo "Injected model files into $MODEL_BUNDLE_DIR"
            ls -lh "$MODEL_BUNDLE_DIR/"
          else
            echo "::warning::No extracted model found — IPA will lack bundled CosyVoice model."
          fi

          # 4. Create Info.plist
          PLIST_PATH="$APP_DIR/Info.plist"
          plutil -create xml1 "$PLIST_PATH"
          plutil -insert CFBundleDevelopmentRegion -string "en" "$PLIST_PATH"
          plutil -insert CFBundleExecutable -string "FeatureTTSReader" "$PLIST_PATH"
          plutil -insert CFBundleIdentifier -string "com.example.FeatureTTSReader" "$PLIST_PATH"
          plutil -insert CFBundleInfoDictionaryVersion -string "6.0" "$PLIST_PATH"
          plutil -insert CFBundleName -string "FeatureTTSReader" "$PLIST_PATH"
          plutil -insert CFBundlePackageType -string "APPL" "$PLIST_PATH"
          plutil -insert CFBundleShortVersionString -string "1.0" "$PLIST_PATH"
          plutil -insert CFBundleVersion -string "1" "$PLIST_PATH"
          plutil -insert LSRequiresIPhoneOS -bool YES "$PLIST_PATH"
          plutil -insert MinimumOSVersion -string "18.0" "$PLIST_PATH"
          plutil -insert UIDeviceFamily -array "$PLIST_PATH"
          plutil -insert UIDeviceFamily.0 -integer 1 "$PLIST_PATH"
          plutil -insert UIDeviceFamily.1 -integer 2 "$PLIST_PATH"

          # 5. Create IPA
          cd build
          MODEL_TAG="${{ steps.model.outputs.tag }}"
          IPA_NAME="FeatureTTSReader_${MODEL_TAG}.ipa"
          zip -r "$IPA_NAME" Payload
          echo "IPA created: build/$IPA_NAME"
          ls -lh "$IPA_NAME"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MODEL_TAG="${{ steps.model.outputs.tag }}"
          DATE=$(date +%Y%m%d-%H%M)
          RELEASE_TAG="app-bundled-${MODEL_TAG}-${DATE}"
          TITLE="${{ inputs.release_title }}"
          if [ -z "$TITLE" ]; then
            TITLE="FeatureTTSReader with bundled ${MODEL_TAG}"
          fi
          IPA="build/FeatureTTSReader_${MODEL_TAG}.ipa"

          echo "Creating release $RELEASE_TAG"
          gh release create "$RELEASE_TAG" \
            "$IPA" \
            --title "$TITLE" \
            --notes "FeatureTTSReader IPA with bundled CosyVoice model: ${{ inputs.variant }}" \
            --prerelease

          echo "✅ Released: $RELEASE_TAG"

      - name: Upload IPA as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: FeatureTTSReader-${{ steps.model.outputs.tag }}-IPA
          path: build/FeatureTTSReader_*.ipa
          if-no-files-found: error
